name: Bug report
description: Report a problem with Secure Trade.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough information to reproduce the issue.

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "Example: 1.21.1"
    validations:
      required: true

  - type: dropdown
    id: loader
    attributes:
      label: Mod loader
      options:
        - Fabric
        - NeoForge
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Loader version
      placeholder: "Example: Fabric Loader 0.16.14 or NeoForge 21.1.172"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Secure Trade version
      placeholder: "Example: 1.1.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Dedicated server
        - LAN world
        - Singleplayer
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the problem.
      placeholder: |
        1. Run /trade ...
        2. Accept the request
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: other-mods
    attributes:
      label: Other installed mods
      description: Paste a mod list if this happens in a modpack or with other mods installed.
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report
      description: Attach or paste latest.log, debug.log, or the crash report if available.
      render: text
