modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="mod_icon.png"
authors="Navielon"
description='''
Trade items with other players from anywhere, without running back to base or meeting in the same dimension. Secure Trade adds chat-based trade requests, a shared trade screen, locked offers, and a short completion countdown. Trades are unlimited by distance and dimension by default, with server-side options for local-only distance limits, cooldowns, logging, and timeouts.
'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${loader_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
